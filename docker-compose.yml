# Local development dependencies. Run the Next.js app on the host with
# `pnpm dev`; this file provides Postgres and MinIO (S3-compatible storage).
#
#   pnpm docker:db      # just Postgres
#   pnpm docker:minio   # MinIO + one-shot bucket init
#
services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d app']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000' # S3 API — matches S3_ENDPOINT in .env.example
      - '9001:9001' # Web console (dev convenience only)
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 10

  # Local mail catcher — SMTP on 1025, web UI + REST API on 8025. Used to
  # exercise the email flows (reset / verification) end-to-end in E2E without
  # sending real mail. See docs/email.md.
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - '1025:1025' # SMTP — matches SMTP_PORT for local email
      - '8025:8025' # Web UI + API
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8025/readyz']
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: creates the app bucket, then exits. Safe to re-run (idempotent).
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/app-files &&
      echo 'MinIO bucket ready'
      "
    restart: 'no'

volumes:
  pgdata:
  miniodata:

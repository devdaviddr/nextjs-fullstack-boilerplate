# Full production-like stack: database, one-shot migrator, and the app.
#
#   AUTH_SECRET=$(openssl rand -base64 33) docker compose -f docker-compose.prod.yml up --build
#
services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-app}']
      interval: 5s
      timeout: 5s
      retries: 10

  # Runs migrations once, then exits. The app waits for it to complete.
  # Needs the same S3_* vars as `app` — `src/lib/env.ts` validates them at
  # import time even though the migrator itself never touches storage.
  migrate:
    build:
      context: .
      target: builder
    command: ['pnpm', 'db:migrate']
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-app}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-app-files}
    depends_on:
      db:
        condition: service_healthy
    restart: 'no'

  # Object storage — S3-compatible, MinIO. No published ports: `app` is the
  # only public gateway (uploads/downloads are proxied through it), so this
  # never needs a second Cloudflare Tunnel hostname.
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: creates the app bucket, then exits. Safe to re-run (idempotent).
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb --ignore-existing local/${S3_BUCKET:-app-files} &&
      echo 'MinIO bucket ready'
      "
    restart: 'no'

  # Nightly Postgres backups via a maintained image (no hand-rolled cron).
  # Writes timestamped, compressed dumps to ./backups/postgres/{daily,...} and
  # prunes them past the retention window. See docs/backups.md for restore.
  db-backup:
    image: prodrigestivill/postgres-backup-local:17
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      # Nightly at 02:00; keep BACKUP_RETENTION_DAYS daily dumps (default 14).
      SCHEDULE: '@daily'
      BACKUP_KEEP_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      BACKUP_KEEP_WEEKS: 0
      BACKUP_KEEP_MONTHS: 0
      POSTGRES_EXTRA_OPTS: '-Z6 --no-owner'
    volumes:
      - ./backups/postgres:/backups
    depends_on:
      db:
        condition: service_healthy

  # Periodic MinIO object backup. No turnkey image exists, so a small sidecar
  # loop runs `mc mirror` — same one-shot/sidecar pattern as minio-init. This is
  # a live mirror (not versioned snapshots); --overwrite keeps it current but
  # never removes files, so a deleted object is still recoverable from the copy.
  minio-backup:
    image: minio/mc:latest
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./backups/minio:/backups
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-app-files}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      while true; do
        echo '[minio-backup] mirroring bucket' &&
        mc mirror --overwrite local/$$S3_BUCKET /backups/$$S3_BUCKET || echo '[minio-backup] mirror failed';
        sleep $$BACKUP_INTERVAL_SECONDS;
      done
      "

  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-app}
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET is required}
      AUTH_TRUST_HOST: 'true'
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-app-files}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully

volumes:
  pgdata:
  miniodata:

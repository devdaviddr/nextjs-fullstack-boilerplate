name: CI

on:
  push:
    branches: [main]
    tags: ['v*'] # release tags → publish the semver-tagged image
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: '1'

jobs:
  quality:
    name: Lint · Typecheck · Unit
    # A release tag re-uses the image already built + tested on the `main` push
    # for the same commit (see the `release` job), so it does NOT re-run these.
    if: github.ref_type != 'tag'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:coverage
      - name: Audit dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: true

  e2e:
    name: E2E (Playwright)
    if: github.ref_type != 'tag'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/app?sslmode=disable
      AUTH_SECRET: ci-test-secret-not-for-production-use-only
      AUTH_TRUST_HOST: 'true'
      S3_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET: app-files
      # Email enabled against the Mailpit catcher so the reset/verification
      # round-trips run in E2E (email-flow.spec.ts).
      EMAIL_ENABLED: 'true'
      EMAIL_FROM: e2e@example.com
      SMTP_HOST: 127.0.0.1
      SMTP_PORT: '1025'
      SMTP_SECURE: 'false'
      APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # MinIO can't be a `services:` container — that block only supports
      # `image`/`env`/`ports`, never a custom command, and the minio/minio
      # image needs `server /data` args to actually run (bare, it just prints
      # help and exits). Started explicitly instead, mirroring
      # docker-compose.yml's minio + minio-init services.
      - name: Start MinIO
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio server /data
          for i in $(seq 1 30); do
            curl -sf http://localhost:9000/minio/health/live && break
            sleep 1
          done
      - name: Create MinIO bucket
        run: |
          docker run --rm --network host --entrypoint /bin/sh minio/mc -c "
            mc alias set local http://localhost:9000 minioadmin minioadmin &&
            mc mb --ignore-existing local/app-files
          "
      - name: Start Mailpit (email catcher for E2E)
        run: |
          docker run -d --name mailpit -p 1025:1025 -p 8025:8025 axllent/mailpit
          for i in $(seq 1 30); do
            curl -sf http://localhost:8025/readyz && break
            sleep 1
          done
      - name: Apply database migrations
        run: pnpm db:migrate
      - name: Seed (demo admin user + roles, used by E2E)
        run: pnpm db:seed
      - name: Build
        run: pnpm build
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Run E2E tests
        run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Build each arch on its OWN native runner (no QEMU emulation → fast), push by
  # digest, then `docker-merge` assembles the multi-arch manifest. Publishing is
  # gated to non-PR events; PRs build both arches cache-only to prove they
  # compile without pushing (fork-safe).
  #
  # Gated on `quality` only (fast: lint/type/unit) so the ~2–3 min build overlaps
  # the ~2 min e2e instead of queuing behind it — `docker-merge` still `needs` e2e,
  # so nothing gets a human tag until the full suite is green. Release tags don't
  # build here at all; they re-tag this commit's already-published image (see
  # the `release` job).
  docker:
    name: Build image (${{ matrix.platform }})
    needs: [quality]
    if: github.ref_type != 'tag'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    env:
      APP_IMAGE: ghcr.io/${{ github.repository }}
      MIGRATE_IMAGE: ghcr.io/${{ github.repository }}/migrate
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Platform pair
        run: echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"
        env:
          platform: ${{ matrix.platform }}

      # app image (production `runner` target)
      - name: Build app (${{ matrix.platform }})
        id: build-app
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runner
          platforms: ${{ matrix.platform }}
          # Bake the build identity into the image (shown in the app's Settings).
          # ref_name is the semver tag on a release build, or `main` on a branch build.
          build-args: |
            APP_VERSION=${{ github.ref_name }}
            APP_GIT_SHA=${{ github.sha }}
          outputs: ${{ github.event_name != 'pull_request' && format('type=image,name={0},push-by-digest=true,name-canonical=true,push=true', env.APP_IMAGE) || 'type=cacheonly' }}
          cache-from: type=gha,scope=app-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=app-${{ env.PLATFORM_PAIR }}

      # migrate image (`builder` target — the only one that can run `db:migrate`)
      - name: Build migrate (${{ matrix.platform }})
        id: build-migrate
        uses: docker/build-push-action@v6
        with:
          context: .
          target: builder
          platforms: ${{ matrix.platform }}
          outputs: ${{ github.event_name != 'pull_request' && format('type=image,name={0},push-by-digest=true,name-canonical=true,push=true', env.MIGRATE_IMAGE) || 'type=cacheonly' }}
          cache-from: type=gha,scope=migrate-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=migrate-${{ env.PLATFORM_PAIR }}

      - name: Export digests
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p "$RUNNER_TEMP/app" "$RUNNER_TEMP/migrate"
          touch "$RUNNER_TEMP/app/${APP_DIGEST#sha256:}"
          touch "$RUNNER_TEMP/migrate/${MIGRATE_DIGEST#sha256:}"
        env:
          APP_DIGEST: ${{ steps.build-app.outputs.digest }}
          MIGRATE_DIGEST: ${{ steps.build-migrate.outputs.digest }}

      - name: Upload app digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: digests-app-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/app/*
          retention-days: 1
          if-no-files-found: error

      - name: Upload migrate digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: digests-migrate-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/migrate/*
          retention-days: 1
          if-no-files-found: error

  # Assemble the per-arch digests into one multi-arch manifest per image, tagged
  # by metadata-action (sha / branch / semver on tags / latest on main).
  docker-merge:
    name: Publish multi-arch manifest
    # `needs` e2e as well as docker, so the tag/publish only happens once BOTH the
    # build and the full test suite are green (the build itself only needed
    # `quality`). Skipped for PRs (build-only) and for tags (the `release` job
    # re-tags instead of rebuilding).
    needs: [docker, e2e]
    if: github.event_name != 'pull_request' && github.ref_type != 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      APP_IMAGE: ghcr.io/${{ github.repository }}
      MIGRATE_IMAGE: ghcr.io/${{ github.repository }}/migrate
    steps:
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- app manifest ---
      - name: Download app digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/app
          pattern: digests-app-*
          merge-multiple: true
      - name: App image metadata
        id: meta-app
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.APP_IMAGE }}
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Create & push app manifest
        working-directory: ${{ runner.temp }}/app
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.APP_IMAGE }}@sha256:%s ' *)
          docker buildx imagetools inspect ${{ env.APP_IMAGE }}:${{ steps.meta-app.outputs.version }}

      # --- migrate manifest ---
      - name: Download migrate digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/migrate
          pattern: digests-migrate-*
          merge-multiple: true
      - name: Migrate image metadata
        id: meta-migrate
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.MIGRATE_IMAGE }}
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Create & push migrate manifest
        working-directory: ${{ runner.temp }}/migrate
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.MIGRATE_IMAGE }}@sha256:%s ' *)
          docker buildx imagetools inspect ${{ env.MIGRATE_IMAGE }}:${{ steps.meta-migrate.outputs.version }}

  # A `v*` release tag does NOT rebuild. The tag sits on a commit that the `main`
  # push already built, tested, and published (as `sha-<short>` + `latest`), so a
  # rebuild would recompile a bit-identical image just to add the semver tag — the
  # slowest part of the whole tag→live path. Instead we add the version tag to the
  # existing multi-arch digest with `imagetools create` (a manifest op, ~30s).
  #
  # Version *identity* is applied at RUNTIME — the box sets APP_VERSION=${APP_TAG}
  # via docker-compose.deploy.yml, and APP_GIT_SHA stays baked (correct) in the
  # image — so re-tagging needs no rebuild to keep Settings → Build accurate.
  # See spec 0024. The wait loop makes this tag inherit `main`'s full test gate:
  # the source image only exists if `main`'s quality+e2e+build all passed.
  release:
    name: Tag release image (no rebuild)
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release (packages needs write anyway)
      packages: write
    env:
      APP_IMAGE: ghcr.io/${{ github.repository }}
      MIGRATE_IMAGE: ghcr.io/${{ github.repository }}/migrate
    steps:
      - uses: actions/checkout@v4 # CHANGELOG.md + tag message for the Release entry
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version + source tags
        run: |
          # `type=semver,pattern={{version}}` publishes the unprefixed semver, so
          # strip the leading `v` to match (v0.16.3 → 0.16.3). The source is the
          # immutable per-commit tag `main` published: `sha-` + short (7) SHA.
          echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          echo "SHA_TAG=sha-${GITHUB_SHA:0:7}" >> "$GITHUB_ENV"

      - name: Wait for the main-built image (same commit) to be published
        run: |
          echo "Waiting for ${APP_IMAGE}:${SHA_TAG} + ${MIGRATE_IMAGE}:${SHA_TAG}"
          echo "(published by the main push for commit ${GITHUB_SHA:0:7})…"
          for i in $(seq 1 40); do
            if docker buildx imagetools inspect "${APP_IMAGE}:${SHA_TAG}" >/dev/null 2>&1 \
              && docker buildx imagetools inspect "${MIGRATE_IMAGE}:${SHA_TAG}" >/dev/null 2>&1; then
              echo "✓ source images present"; exit 0
            fi
            echo "  …not published yet (attempt $i/40) — sleeping 20s"; sleep 20
          done
          echo "::error::Timed out waiting for ${SHA_TAG}. The main build for this commit must go green first — it publishes the tested image this tag re-tags. Re-run this job once main is green, or push the tag after main's CI passes."
          exit 1

      # `stable` floats to the most recently pushed release tag. It's what a
      # Tier B box tracks to auto-deploy *releases only*: `latest` moves on every
      # main merge, a pinned semver never moves — `stable` moves exactly when a
      # release is cut. Note it moves on ANY v* push, including an old tag: roll
      # back by pinning APP_TAG to a semver, not by re-pushing old tags.
      - name: Re-tag app + migrate with the release version + stable
        run: |
          docker buildx imagetools create -t "${APP_IMAGE}:${VERSION}"     -t "${APP_IMAGE}:stable"     "${APP_IMAGE}:${SHA_TAG}"
          docker buildx imagetools create -t "${MIGRATE_IMAGE}:${VERSION}" -t "${MIGRATE_IMAGE}:stable" "${MIGRATE_IMAGE}:${SHA_TAG}"
          echo "── app ${VERSION} ──";     docker buildx imagetools inspect "${APP_IMAGE}:${VERSION}"
          echo "── migrate ${VERSION} ──"; docker buildx imagetools inspect "${MIGRATE_IMAGE}:${VERSION}"

      # The Releases page is generated, never hand-maintained (it froze at v0.5.0
      # once while tags marched on to v0.18.0). Notes come from this version's
      # CHANGELOG.md section; the title comes from an annotated tag's subject
      # ("vX.Y.Z — <subject>"), falling back to the bare version for lightweight
      # tags (a commit subject like "chore(release): …" is ignored). Idempotent:
      # a job re-run skips if the release already exists.
      - name: Create GitHub Release (notes from CHANGELOG)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "release v${VERSION} already exists — skipping"; exit 0
          fi
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { hit = 1; next }
            hit && /^## \[/ { exit }
            hit { print }
          ' CHANGELOG.md > "$RUNNER_TEMP/notes.md"
          subject="$(git for-each-ref --format='%(contents:subject)' "refs/tags/v${VERSION}")"
          title="v${VERSION}"
          case "$subject" in
            '' | "Release v"* | "chore(release)"*) ;; # lightweight tag → commit subject → skip
            *) title="v${VERSION} — ${subject}" ;;
          esac
          if [ -s "$RUNNER_TEMP/notes.md" ]; then
            gh release create "v${VERSION}" --title "$title" --notes-file "$RUNNER_TEMP/notes.md" --verify-tag
          else
            echo "::warning::no CHANGELOG.md section for ${VERSION} — using generated notes"
            gh release create "v${VERSION}" --title "$title" --generate-notes --verify-tag
          fi

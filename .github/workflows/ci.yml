name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: '1'

jobs:
  quality:
    name: Lint · Typecheck · Unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:coverage
      - name: Audit dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: true

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/app?sslmode=disable
      AUTH_SECRET: ci-test-secret-not-for-production-use-only
      AUTH_TRUST_HOST: 'true'
      S3_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET: app-files
      # Email enabled against the Mailpit catcher so the reset/verification
      # round-trips run in E2E (email-flow.spec.ts).
      EMAIL_ENABLED: 'true'
      EMAIL_FROM: e2e@example.com
      SMTP_HOST: 127.0.0.1
      SMTP_PORT: '1025'
      SMTP_SECURE: 'false'
      APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # MinIO can't be a `services:` container — that block only supports
      # `image`/`env`/`ports`, never a custom command, and the minio/minio
      # image needs `server /data` args to actually run (bare, it just prints
      # help and exits). Started explicitly instead, mirroring
      # docker-compose.yml's minio + minio-init services.
      - name: Start MinIO
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio server /data
          for i in $(seq 1 30); do
            curl -sf http://localhost:9000/minio/health/live && break
            sleep 1
          done
      - name: Create MinIO bucket
        run: |
          docker run --rm --network host --entrypoint /bin/sh minio/mc -c "
            mc alias set local http://localhost:9000 minioadmin minioadmin &&
            mc mb --ignore-existing local/app-files
          "
      - name: Start Mailpit (email catcher for E2E)
        run: |
          docker run -d --name mailpit -p 1025:1025 -p 8025:8025 axllent/mailpit
          for i in $(seq 1 30); do
            curl -sf http://localhost:8025/readyz && break
            sleep 1
          done
      - name: Apply database migrations
        run: pnpm db:migrate
      - name: Seed (demo admin user + roles, used by E2E)
        run: pnpm db:seed
      - name: Build
        run: pnpm build
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Run E2E tests
        run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: nextjs-fullstack-boilerplate:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

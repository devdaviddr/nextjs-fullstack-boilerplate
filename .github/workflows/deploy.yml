# Opt-in continuous deployment to a SELF-HOSTED runner (spec 0021 Tier C).
#
# ⚠️  DO NOT ENABLE ON A PUBLIC REPO. A self-hosted runner on a public repo is
# the configuration GitHub explicitly warns against: a fork pull request can add
# a workflow that targets `runs-on: [self-hosted]` and, once its run is approved,
# executes ARBITRARY CODE on your box / home LAN. The `SELF_HOSTED_DEPLOY` gate
# below does NOT protect you — a malicious fork brings its own workflow file.
#
# For PUBLIC repos use pull-based deploy (Tier B) instead: a scheduled
# `make deploy` timer on the box (scripts/macos-deploy-timer.sh / `make
# deploy-timer`). The box reaches OUT to GHCR; GitHub never runs your code on it.
# See spec 0023 and docs/self-hosting.md.
#
# This workflow is disabled by default (skipped unless repo variable
# SELF_HOSTED_DEPLOY == 'true'). Enable it ONLY on a PRIVATE/trusted repo, and
# even then prefer an EPHEMERAL, low-privilege runner. See docs/self-hosting.md.
name: Deploy (self-hosted)

on:
  push:
    tags: ['v*']
  workflow_dispatch: # manual "Run workflow" button

jobs:
  deploy:
    if: vars.SELF_HOSTED_DEPLOY == 'true'
    runs-on: [self-hosted]
    steps:
      - uses: actions/checkout@v4
      # actions/checkout cleans the work tree every run (git clean -ffdx), so
      # .env cannot live in the checkout. The operator keeps it at a fixed path
      # on the box (override with a DEPLOY_ENV_FILE runner env var); it holds
      # APP_IMAGE / APP_TAG and the tunnel vars (AUTH_URL, CLOUDFLARE_TUNNEL_TOKEN,
      # AUTH_SECRET). See docs/self-hosting.md → Tier C.
      - name: Pull & deploy
        run: |
          ENV_SRC="${DEPLOY_ENV_FILE:-$HOME/.config/nextjs-fullstack-boilerplate/.env}"
          if [ ! -f "$ENV_SRC" ]; then
            echo "::error::$ENV_SRC not found on the runner box — create it (see docs/self-hosting.md → Tier C)"
            exit 1
          fi
          install -m 600 "$ENV_SRC" .env
          make deploy
